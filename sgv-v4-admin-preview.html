<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Admin · SG Versbachtal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#003399;--gold:#FFD700;--ink:#0f0f0f;--muted:#888;--rule:#e8e8e8;--off:#f9f9f7;--white:#fff;--red:#dc2626;--green:#16a34a}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--ink);min-height:100vh}
a{text-decoration:none;color:inherit}

/* TOPBAR */
.topbar{background:var(--blue);padding:12px 1.5rem;display:flex;align-items:center;justify-content:space-between}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-brand img{width:36px;height:36px;object-fit:contain}
.tb-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:#fff}
.tb-sub{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,215,0,.7)}
.tb-right{display:flex;gap:.5rem;align-items:center}
.tb-btn{font-size:.75rem;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;letter-spacing:.04em;transition:.2s;-webkit-tap-highlight-color:transparent}
.tb-home{background:rgba(255,255,255,.12);color:#fff}.tb-home:hover{background:rgba(255,255,255,.2)}
.tb-logout{background:rgba(220,38,38,.7);color:#fff}.tb-logout:hover{background:#dc2626}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:2rem}
.login-box{background:var(--white);border:1px solid var(--rule);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.login-logo{width:80px;height:80px;object-fit:contain;margin:0 auto 1.2rem}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;margin-bottom:.25rem}
.login-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.8rem;font-weight:300}
.login-box input{width:100%;padding:13px 14px;border:1.5px solid var(--rule);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:.2s;text-align:center;letter-spacing:.12em;margin-bottom:1rem}
.login-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,51,153,.08)}
.login-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.login-btn:hover{background:#0033cc}
.login-err{color:var(--red);font-size:.82rem;margin-top:.75rem;display:none}

/* ADMIN PANEL */
#adminPanel{display:none;max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:2px solid var(--ink)}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start}

/* FORM CARD */
.card{background:var(--white);border:1px solid var(--rule);border-radius:14px;padding:1.5rem}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.04em;margin-bottom:1.2rem;display:flex;align-items:center;gap:8px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem}
.fg label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.fg input,.fg select,.fg textarea{padding:11px 12px;background:var(--off);border:1.5px solid var(--rule);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);outline:none;transition:.2s;width:100%;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,51,153,.08)}
.fg textarea{resize:vertical;min-height:110px;line-height:1.5}
.submit-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.04em}
.submit-btn:hover{background:#0033cc}
.submit-btn:active{transform:scale(.98)}
.success-msg{background:#dcfce7;color:var(--green);border:1px solid #bbf7d0;border-radius:8px;padding:.8rem 1rem;font-size:.84rem;font-weight:600;margin-top:.75rem;display:none;text-align:center}

/* POSTS LIST */
.posts-list{display:flex;flex-direction:column;gap:.6rem;max-height:520px;overflow-y:auto}
.post-item{background:var(--off);border:1px solid var(--rule);border-radius:10px;padding:.9rem 1rem;display:flex;gap:.75rem;align-items:flex-start}
.pi-emoji{font-size:1.4rem;flex-shrink:0;line-height:1}
.pi-body{flex:1;min-width:0}
.pi-cat{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:2px}
.pi-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.04em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-text{font-size:.78rem;color:var(--muted);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.pi-date{font-size:.65rem;color:var(--muted);margin-top:3px;font-weight:500}
.pi-del{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:4px;border-radius:4px;transition:.2s;flex-shrink:0;line-height:1}
.pi-del:hover{color:var(--red);background:rgba(220,38,38,.08)}
.no-posts{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.86rem;font-weight:300}

/* TICKER EDIT */
.ticker-editor{margin-top:1.5rem}
.te-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--off);border:1px solid var(--rule);border-radius:6px;font-size:.78rem;font-weight:500;margin:.25rem}
.te-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;line-height:1;padding:0 0 0 4px}
.te-del:hover{color:var(--red)}

/* RESPONSIVE */
@media(max-width:680px){.panel-grid{grid-template-columns:1fr}.panel-title{font-size:1.5rem}}
</style>
</head>

    <div class="login-title">Admin-Bereich</div>
    <div class="login-sub">SG Versbachtal · Vereinsverwaltung</div>
    <input type="password" id="passInput" placeholder="Passwort" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Einloggen</button>
    <div class="login-err" id="loginErr">❌ Falsches Passwort</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="panel-title">📋 Vereinsverwaltung</div>

  <div class="panel-grid">

    <!-- NEW POST FORM -->
    <div class="card">
      <div class="card-title">📰 Neuer Beitrag</div>
      <div class="fg">
        <label>Kategorie</label>
        <select id="postCat">
          <option>Vereinsnews</option>
          <option>Spielbericht</option>
          <option>Termin</option>
          <option>Ankündigung</option>
          <option>Sonstiges</option>
        </select>
      </div>
      <div class="fg">
        <label>Titel *</label>
        <input type="text" id="postTitle" placeholder="z. B. Trainingsbeginn nach Winterpause" maxlength="80"/>
      </div>
      <div class="fg">
        <label>Text *</label>
        <textarea id="postText" placeholder="Beitragstext hier eingeben…" maxlength="500"></textarea>
      </div>
      <button class="submit-btn" onclick="addPost()">Beitrag veröffentlichen →</button>
      <div class="success-msg" id="postSuccess">✓ Beitrag veröffentlicht!</div>
    </div>

    <!-- POSTS LIST -->
    <div class="card">
      <div class="card-title">📄 Veröffentlichte Beiträge <span id="postCount" style="font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:400;color:var(--muted)"></span></div>
      <div class="posts-list" id="postsList"></div>
    </div>

  </div>

  <!-- TICKER EDIT -->
  <div class="card ticker-editor" style="margin-top:1.5rem">
    <div class="card-title">📡 Ticker bearbeiten</div>
    <p style="font-size:.82rem;color:var(--muted);font-weight:300;margin-bottom:1rem">Füge eigene Texte zum Laufband hinzu — sie erscheinen sofort auf der Startseite.</p>
    <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap">
      <input type="text" id="tickerInput" placeholder="z. B. ⚽ Heimspiel Sa. 15:00 Uhr!" maxlength="80"
        style="flex:1;min-width:180px;padding:10px 12px;border:1.5px solid var(--rule);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none"
        onkeydown="if(event.key==='Enter')addTickerItem()"
        onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--rule)'"/>
      <button onclick="addTickerItem()" style="padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer">Hinzufügen</button>
    </div>
    <div id="tickerTags"></div>
  </div>

</div>

<script>
const NS = 'sgv_news_v1';
const TS = 'sgv_ticker_v1';
const PASS = 'sgv2025';
const EMOJIS = {'Vereinsnews':'📰','Spielbericht':'⚽','Termin':'📅','Ankündigung':'📣','Sonstiges':'💬'};

// ── AUTH ───────────────────────────────────────────────────────────────────
function doLogin() {
  const v = document.getElementById('passInput').value;
  if (v === PASS) {
    sessionStorage.setItem('sgv_auth','1');
    showPanel();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('passInput').value='';
    document.getElementById('passInput').focus();
  }
}

function logout() {
  sessionStorage.removeItem('sgv_auth');
  location.reload();
}

function showPanel() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  document.getElementById('logoutBtn').style.display='';
  renderPosts();
  renderTickerTags();
}

// ── DATA ──────────────────────────────────────────────────────────────────
function getPosts() {
  try { return JSON.parse(localStorage.getItem(NS)||'[]'); } catch(e) { return []; }
}
function savePosts(p) { localStorage.setItem(NS, JSON.stringify(p)); }
function getTicker() {
  try { return JSON.parse(localStorage.getItem(TS)||'[]'); } catch(e) { return []; }
}
function saveTicker(t) { localStorage.setItem(TS, JSON.stringify(t)); }

// ── ADD POST ──────────────────────────────────────────────────────────────
function addPost() {
  const cat = document.getElementById('postCat').value;
  const title = document.getElementById('postTitle').value.trim();
  const text = document.getElementById('postText').value.trim();
  if (!title || !text) { alert('Bitte Titel und Text ausfüllen.'); return; }
  const posts = getPosts();
  posts.push({ id: Date.now(), cat, title, text, date: new Date().toISOString() });
  savePosts(posts);
  document.getElementById('postTitle').value='';
  document.getElementById('postText').value='';
  const msg = document.getElementById('postSuccess');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none', 3000);
  renderPosts();
}

// ── DELETE POST ──────────────────────────────────────────────────────────
function deletePost(id) {
  if (!confirm('Beitrag löschen?')) return;
  savePosts(getPosts().filter(p=>p.id!==id));
  renderPosts();
}

// ── RENDER POSTS ──────────────────────────────────────────────────────────
function renderPosts() {
  const list = document.getElementById('postsList');
  const posts = getPosts();
  document.getElementById('postCount').textContent = posts.length ? `(${posts.length})` : '';
  if (!posts.length) {
    list.innerHTML = '<div class="no-posts">📭 Noch keine Beiträge</div>';
    return;
  }
  list.innerHTML = [...posts].reverse().map(p => {
    const d = new Date(p.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    return `<div class="post-item">
      <span class="pi-emoji">${EMOJIS[p.cat]||'📰'}</span>
      <div class="pi-body">
        <div class="pi-cat">${p.cat}</div>
        <div class="pi-title">${p.title}</div>
        <div class="pi-text">${p.text}</div>
        <div class="pi-date">${d}</div>
      </div>
      <button class="pi-del" onclick="deletePost(${p.id})" title="Löschen">🗑</button>
    </div>`;
  }).join('');
}

// ── TICKER ────────────────────────────────────────────────────────────────
function addTickerItem() {
  const inp = document.getElementById('tickerInput');
  const val = inp.value.trim();
  if (!val) return;
  const items = getTicker();
  items.push({ id: Date.now(), text: val });
  saveTicker(items);
  inp.value = '';
  renderTickerTags();
}

function deleteTickerItem(id) {
  saveTicker(getTicker().filter(t=>t.id!==id));
  renderTickerTags();
}

function renderTickerTags() {
  const box = document.getElementById('tickerTags');
  const items = getTicker();
  if (!items.length) {
    box.innerHTML = '<span style="font-size:.8rem;color:var(--muted);font-weight:300">Noch keine eigenen Ticker-Einträge</span>';
    return;
  }
  box.innerHTML = items.map(t=>
    `<span class="te-tag">${t.text}<button class="te-del" onclick="deleteTickerItem(${t.id})">✕</button></span>`
  ).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────
if (sessionStorage.getItem('sgv_auth') === '1') showPanel();
document.getElementById('passInput')?.addEventListener('keydown', e => {
  if (e.key==='Enter') doLogin();
});
</script>
</body>
</html>
